<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Supersonic AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@800&display=swap');
        
        :root { --bg-dark: #0e0e11; }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: #e3e3e3; overflow: hidden; height: 100vh; display: flex; position: relative; }

        /* --- SCROLLBARS (RED THEME) --- */
        #chat-container::-webkit-scrollbar, #user-input::-webkit-scrollbar { width: 5px; }
        #chat-container::-webkit-scrollbar-thumb, #user-input::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ef4444, #7f1d1d);
            border-radius: 10px;
        }

        #particle-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        .supersonic-brand {
            font-family: 'Outfit', sans-serif; font-size: 24px; font-weight: 800;
            background: linear-gradient(to right, #ffffff 20%, #ef4444 40%, #b91c1c 60%, #f87171 80%, #ffffff 100%);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: colorFlow 5s linear infinite;
        }
        @keyframes colorFlow { 0% { background-position: 0% center; } 100% { background-position: 200% center; } }

        #sidebar { width: 72px; height: 100vh; background: rgba(15, 15, 18, 0.95); display: flex; flex-direction: column; align-items: center; padding: 24px 0; border-right: 1px solid rgba(255,255,255,0.05); z-index: 50; }

        .main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; z-index: 10; }

        .mode-btn { padding: 10px; border-radius: 12px; color: #888; transition: all 0.4s ease; border: 1px solid transparent; cursor: pointer; }
        .mode-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }

        .mode-btn.active-research { color: #3b82f6; background: rgba(59, 130, 246, 0.1); border-color: rgba(59, 130, 246, 0.4); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .mode-btn.active-study { color: #22c55e; background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.4); box-shadow: 0 0 15px rgba(34, 197, 94, 0.4); }
        .mode-btn.active-think { color: #ef4444; background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.4); box-shadow: 0 0 15px rgba(239, 68, 68, 0.4); }

        .gemini-input-container {
            background: rgba(30, 31, 32, 0.85); backdrop-filter: blur(12px);
            border-radius: 28px; padding: 16px 24px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 800px; margin: 0 auto;
            position: relative;
        }
        #user-input { background: transparent; border: none; outline: none; color: #fff; width: 100%; resize: none; font-size: 17px; max-height: 150px; overflow-y: auto; }

        #settings-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); z-index: 100; align-items: center; justify-content: center; }
        .modal-content { background: #18181b; border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 24px; width: 90%; max-width: 400px; }

        .typing-indicator { display: flex; gap: 4px; padding: 12px 18px; background: rgba(43, 44, 47, 0.9); border-radius: 20px; width: fit-content; border: 1px solid rgba(255,255,255,0.08); }
        .typing-indicator span { width: 8px; height: 8px; background: #ef4444; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        .action-btn { opacity: 0.4; transition: all 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .action-btn:hover { opacity: 1; transform: scale(1.1); }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <aside id="sidebar">
        <div class="mb-8 cursor-pointer p-3 rounded-full hover:bg-white/10 transition" onclick="location.reload()">
            <i data-lucide="plus" class="w-6 h-6 text-white"></i>
        </div>
        <div class="flex-1"></div>
        <div class="cursor-pointer p-3 rounded-full mb-4 hover:bg-white/10 text-gray-400 hover:text-white transition" onclick="toggleSettings(true)">
            <i data-lucide="settings" class="w-6 h-6"></i>
        </div>
    </aside>

    <div id="settings-modal">
        <div class="modal-content">
            <div class="flex justify-between items-center mb-6"> <h3 class="text-xl font-bold">API Settings</h3> <button onclick="toggleSettings(false)"><i data-lucide="x" class="w-5 h-5 text-gray-500"></i></button> </div>
            <div class="space-y-4">
                <input type="password" id="api-key-input" class="w-full bg-[#27272a] border border-white/10 rounded-lg p-3 outline-none text-white focus:border-blue-500" placeholder="OpenRouter API Key">
                <input type="text" id="model-id-input" class="w-full bg-[#27272a] border border-white/10 rounded-lg p-3 outline-none text-white focus:border-blue-500" value="deepseek/deepseek-chat">
            </div>
            <button class="w-full bg-white text-black font-bold p-3 rounded-lg mt-6 hover:bg-red-500 hover:text-white transition" onclick="saveSettings()">Save Configuration</button>
        </div>
    </div>

    <div class="main-wrapper">
        <header class="w-full py-6 flex justify-center items-center">
            <div class="supersonic-brand">Supersonic AI</div>
        </header>

        <main class="flex-1 flex flex-col overflow-hidden">
            <div id="home-screen" class="flex-1 flex flex-col items-center justify-center p-8 text-center">
                <h2 style="font-family: 'Comic Sans MS', 'Comic Sans', cursive; font-size: 56px; font-weight: normal;" class="text-white">What can I help with?</h2>
                <p class="text-gray-400 mt-1 text-lg">Powered by Supersonic AI</p>
            </div>
            <div id="chat-container" class="hidden flex-1 overflow-y-auto px-6 md:px-40 space-y-8 py-10"></div>
        </main>

        <footer class="px-6 pb-8">
            <div class="max-w-4xl mx-auto">
                <div class="gemini-input-container">
                    <textarea id="user-input" rows="1" placeholder="Ask Supersonic anything..." oninput="autoExpand(this)" onkeydown="checkEnter(event)"></textarea>
                    <div class="flex items-center justify-between mt-4">
                        <div class="flex items-center gap-2">
                            <button class="mode-btn" onclick="document.getElementById('media-upload').click()"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                            <input type="file" id="media-upload" class="hidden" accept="image/*" onchange="handleMediaUpload(event)">
                            <div class="w-[1px] h-4 bg-white/10 mx-1"></div>
                            <button id="btn-research" class="mode-btn" onclick="activateMode('research')"><i data-lucide="globe" class="w-5 h-5"></i></button>
                            <button id="btn-study" class="mode-btn" onclick="activateMode('study')"><i data-lucide="book-open" class="w-5 h-5"></i></button>
                            <button id="btn-think" class="mode-btn" onclick="activateMode('think')"><i data-lucide="brain" class="w-5 h-5"></i></button>
                        </div>
                        <button id="send-btn" onclick="handleSend()" class="p-3 bg-white text-black rounded-full disabled:opacity-20 transition-all" disabled><i data-lucide="arrow-up" class="w-5 h-5"></i></button>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        lucide.createIcons();
        let conversationHistory = []; // No longer saved to localStorage
        let activeMode = null;
        let isLoading = false;

        function activateMode(mode) {
            const btns = ['btn-research', 'btn-study', 'btn-think'];
            const input = document.getElementById('user-input');

            if (activeMode === mode) {
                activeMode = null;
                btns.forEach(id => document.getElementById(id).className = 'mode-btn');
                input.value = ''; 
                autoExpand(input);
                return;
            }

            btns.forEach(id => document.getElementById(id).className = 'mode-btn');
            activeMode = mode;
            document.getElementById('btn-' + mode).classList.add('active-' + mode);
            
            if (mode === 'think') input.value = "Let's think deep about: ";
            else if (mode === 'research') input.value = "Research on: ";
            else if (mode === 'study') input.value = "Explain this concept: ";
            
            autoExpand(input);
            input.focus();
        }

        function toggleSettings(s) { document.getElementById('settings-modal').style.display = s ? 'flex' : 'none'; }
        
        function saveSettings() {
            localStorage.setItem('openrouter_key', document.getElementById('api-key-input').value);
            localStorage.setItem('openrouter_model', document.getElementById('model-id-input').value);
            toggleSettings(false);
        }

        window.onload = () => {
            // Load settings but NOT chat history
            document.getElementById('api-key-input').value = localStorage.getItem('openrouter_key') || '';
            document.getElementById('model-id-input').value = localStorage.getItem('openrouter_model') || 'deepseek/deepseek-chat';
        };

        function autoExpand(t) { 
            t.style.height = 'auto'; t.style.height = Math.min(t.scrollHeight, 150) + 'px'; 
            document.getElementById('send-btn').disabled = (t.value.trim().length === 0) || isLoading;
        }

        function checkEnter(e) { 
            if(e.key==="Enter" && !e.shiftKey && !isLoading) { 
                if(e.target.value.trim().length > 0) { e.preventDefault(); handleSend(); }
            } 
        }

        async function handleSend() {
            if (isLoading) return;
            const input = document.getElementById('user-input');
            const userText = input.value.trim();
            const apiKey = localStorage.getItem('openrouter_key');
            if(!apiKey) { toggleSettings(true); return; }

            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('chat-container').classList.remove('hidden');

            addMsgToUI('user', userText);
            input.value = ''; autoExpand(input);
            addTypingIndicator(); isLoading = true;

            try {
                const res = await fetch("https://openrouter.ai/api/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${apiKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "model": localStorage.getItem('openrouter_model'),
                        "messages": [...conversationHistory, {role:"user",content:userText}]
                    })
                });
                const data = await res.json();
                removeTypingIndicator();
                const aiResponse = data.choices[0].message.content;
                addMsgToUI('assistant', aiResponse);
                conversationHistory.push({role: "user", content: userText});
                conversationHistory.push({role: "assistant", content: aiResponse});
            } catch (e) { removeTypingIndicator(); addMsgToUI('assistant', "⚠️ Error connecting."); }
            finally { isLoading = false; }
        }

        function addMsgToUI(role, text) {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.className = `flex flex-col ${role === 'user' ? 'items-end' : 'items-start'} mb-8 fade-in`;
            
            if (role === 'user') {
                div.innerHTML = `<div class="msg-content" style="background: rgba(43,44,47,0.9); padding: 12px 22px; border-radius: 20px; max-width: 85%; border: 1px solid rgba(255,255,255,0.08);">${text}</div>`;
            } else {
                div.innerHTML = `
                    <div class="flex gap-4 w-full max-w-[95%]">
                        <div class="w-8 h-8 bg-red-600 rounded-lg flex-shrink-0 flex items-center justify-center text-[10px] font-bold">AI</div>
                        <div class="flex-1 pt-1 text-[#e3e3e3] whitespace-pre-wrap msg-content">${text}</div>
                    </div>`;
            }
            container.appendChild(div);
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }

        function addTypingIndicator() {
            const container = document.getElementById('chat-container');
            const div = document.createElement('div');
            div.id = 'typing-indicator';
            div.className = 'flex items-start mb-8';
            div.innerHTML = `<div class="flex gap-4 w-full"><div class="w-8 h-8 bg-red-600 rounded-lg flex-shrink-0 flex items-center justify-center text-[10px] font-bold">AI</div><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
            container.appendChild(div);
            container.scrollTo({ top: container.scrollHeight, behavior: 'smooth' });
        }
        function removeTypingIndicator() { const el = document.getElementById('typing-indicator'); if (el) el.remove(); }

        // --- RED DOTS ANIMATION ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let pts = [];
        function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = res; res();
        for(let i=0; i<80; i++) pts.push({
            x: Math.random()*canvas.width, y: Math.random()*canvas.height, 
            sx: (Math.random()-0.5)*0.2, sy: (Math.random()-0.5)*0.2,
            size: Math.random()*1.5 + 0.5
        });
        function anim() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            pts.forEach(p => {
                p.x += p.sx; p.y += p.sy;
                if(p.x<0||p.x>canvas.width) p.sx *= -1; if(p.y<0||p.y>canvas.height) p.sy *= -1;
                ctx.fillStyle='rgba(239, 68, 68, 0.4)'; 
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
            });
            requestAnimationFrame(anim);
        }
        anim();
    </script>
</body>
</html>
